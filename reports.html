<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Reports - IoT Health</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        /* Context-specific action style layout extensions for Reports */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .btn-download {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: background 0.2s;
        }

        .btn-download:hover {
            background-color: #0369a1;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>🏥 IoT Health</h2>
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="patients.html">👨‍⚕️ Patients</a>
        <a href="alerts.html">🚨 Alerts</a>
        <a href="reports.html">📄 Reports</a>
        <a href="login.html">🚪 Logout</a>
    </div>

    <div class="main">
        <div class="header">
            <h2>Clinical Analytics Reports</h2>
            <div class="top-right">
                <p id="doctorName">👨‍⚕️ DOCTOR</p>
            </div>
        </div>

        <div class="controls-row">
            <input type="text" id="reportSearch" placeholder="Filter reports by name or ID..." style="width: 100%; max-width: 360px; padding: 10px 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px;">
            <p style="color: #64748b; font-size: 14px;">Showing generated summaries for active hospital segments.</p>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Report ID</th>
                    <th>Patient Name</th>
                    <th>Generation Date</th>
                    <th>Risk Classification</th>
                    <th>Diagnostics File</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="reportsTableBody">
                </tbody>
        </table>
    </div>

    <script src="js/reports.js"></script>
</body>
</html>
