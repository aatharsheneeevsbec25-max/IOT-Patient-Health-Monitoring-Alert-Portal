<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Alerts - IoT Health</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        /* Specific page layout adjustments for Alerts */
        .alerts-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .alert-card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border-left: 6px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s, opacity 0.3s;
        }

        .alert-card.critical {
            border-left-color: #ef4444; /* Red */
            background-color: #fef2f2;
        }

        .alert-card.warning {
            border-left-color: #f59e0b; /* Orange */
            background-color: #fffbeb;
        }

        .alert-details h4 {
            font-size: 16px;
            color: #0f172a;
            margin-bottom: 4px;
        }

        .alert-details p {
            font-size: 14px;
            color: #475569;
        }

        .alert-time {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 5px;
            display: block;
        }

        .alert-actions {
            display: flex;
            gap: 10px;
        }

        .btn-ack {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .btn-ack:hover { background-color: #059669; }

        .btn-dismiss {
            background-color: #cbd5e1;
            color: #334155;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .btn-dismiss:hover { background-color: #94a3b8; }

        .no-alerts {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            color: #64748b;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>🏥 IoT Health</h2>
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="patients.html">👨‍⚕️ Patients</a>
        <a href="alerts.html">🚨 Alerts</a>
        <a href="reports.html">📄 Reports</a>
        <a href="login.html">🚪 Logout</a>
    </div>

    <div class="main">
        <div class="header">
            <h2>Emergency Alerts Engine</h2>
            <div class="top-right">
                <p id="doctorName">👨‍⚕️ DOCTOR</p>
                <p id="alertSummary" style="font-size: 13px; color: #ef4444; font-weight: 600; margin-top: 2px;">0 Active Anomalies</p>
            </div>
        </div>

        <h2>Active System Anomalies</h2>
        
        <div class="alerts-list" id="alertsContainer">
            </div>
    </div>

    <script src="js/alerts.js"></script>
</body>
</html>
