<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Management - IoT Health</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/patients.css">
</head>
<body>

    <div class="sidebar">
        <h2>🏥 IoT Health</h2>
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="patients.html" class="active">👨‍⚕️ Patients</a>
        <a href="alerts.html">🚨 Alerts</a>
        <a href="reports.html">📄 Reports</a>
        <a href="index.html">🚪 Logout</a>
    </div>

    <div class="main">
        <div class="header">
            <h2>Patient Registry Management</h2>
            <div class="top-right">
                <p>👨‍⚕️ Clinician Desk</p>
            </div>
        </div>

        <div class="patient-form-container">
            <h3>📝 Register New Monitored Patient</h3>
            <form id="addPatientForm" class="inline-form">
                
                <div class="form-field-group">
                    <label for="pName">Patient Name</label>
                    <input type="text" id="pName" placeholder="e.g. Ramesh Kumar" required>
                </div>

                <div class="form-field-group" style="max-width: 100px;">
                    <label for="pAge">Age</label>
                    <input type="number" id="pAge" placeholder="45" min="1" max="120" required>
                </div>

                <div class="form-field-group">
                    <label for="pGender">Gender</label>
                    <select id="pGender" required>
                        <option value="" disabled selected>Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-field-group">
                    <label for="pStatus">Vitals Condition Status</label>
                    <select id="pStatus" required>
                        <option value="Healthy">Healthy (Nominal)</option>
                        <option value="Warning">Warning (Elevated)</option>
                        <option value="Critical">Critical (Immediate Care)</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit-patient">➕ Add Patient</button>
            </form>
        </div>

        <h3 style="margin-bottom: 15px; color: #0f172a;">Active Monitored Patients</h3>
        <table>
            <thead>
                <tr>
                    <th>Patient ID</th>
                    <th>Full Name</th>
                    <th>Age</th>
                    <th>Gender</th>
                    <th>Status Classification</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="patientsTableBody">
                </tbody>
        </table>
    </div>

    <script src="js/patients.js"></script>
</body>
</html>
