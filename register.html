<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - IoT Patient Health Monitoring</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        /* Contextual overrides to center the registration card on the screen perfectly */
        html, body {
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0f172a; /* Dark sleek medical slate background */
            margin: 0;
            padding: 0;
        }

        .register-container {
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        .register-card {
            background: #ffffff;
            padding: 35px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .register-card h2 {
            color: #0f172a;
            font-size: 26px;
            margin-bottom: 8px;
            text-align: center;
        }

        .register-card p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 25px;
            text-align: center;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 18px;
            flex: 1;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            color: #0f172a;
            transition: all 0.2s ease;
            outline: none;
            background-color: #fff;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #0284c7;
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.15);
        }

        .btn-register {
            width: 100%;
            background-color: #10b981; /* Green success accent for account registration */
            color: white;
            border: none;
            padding: 13px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-top: 10px;
        }

        .btn-register:hover {
            background-color: #059669;
        }

        .message-box {
            font-size: 13px;
            font-weight: 500;
            margin-top: 15px;
            display: none;
            text-align: center;
            padding: 10px;
            border-radius: 6px;
        }

        .msg-error {
            color: #ef4444;
            background-color: #fef2f2;
            border: 1px solid #fee2e2;
        }

        .msg-success {
            color: #065f46;
            background-color: #d1fae5;
            border: 1px solid #bbf7d0;
        }

        .login-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #64748b;
        }

        .login-link a {
            color: #0284c7;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="register-card">
            <h2>🏥 IoT Health</h2>
            <p>Create Clinician Access Profile</p>
            
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" placeholder="Dr. Alex Mercer" required>
                    </div>
                    <div class="form-group">
                        <label for="regId">Medical ID / Reg No</label>
                        <input type="text" id="regId" placeholder="MED-99231" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Institutional Email</label>
                    <input type="email" id="email" placeholder="alex.mercer@hospital.org" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="doctor123" required autocomplete="username">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="••••••••" required autocomplete="new-password">
                    </div>
                </div>
                
                <button type="submit" class="btn-register">Create Account</
