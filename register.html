<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-container">

    <h1>Patient Registration</h1>

    <div id="message-box" style="margin-bottom: 15px; font-weight: bold; display: none;"></div>

    <input type="text" id="name" placeholder="Full Name">
    
    <input type="text" id="admissionNumber" placeholder="Admission Number (e.g., ADM-101)">

    <input type="password" id="password" placeholder="Create Login Password">

    <button onclick="register()">Register</button>

    <p>
        Already have an account?
        <a href="login.html">Login</a>
    </p>

</div>

<script src="js/script.js"></script>

</body>
</html>
